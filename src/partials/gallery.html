<section class="gallery section" id="gallery">
  <div class="container">
    <h2 class="gallery-title">Jewelry Showcase</h2>
    <p class="gallery-text">
      Discover the beauty of our handcrafted jewelry in style.
    </p>
    <ul class="gallery-list">
      <li class="gallery-list-item">
        <picture
          ><source
            media="(min-width: 1440px)"
            srcset="
              /img/gallery/Image1@Desktop.webp   1x,
              /img/gallery/Image1@2xDesktop.webp 2x
            "
          />
          <source
            media="(min-width: 768px)"
            srcset="
              /img/gallery/Image1Tablet.webp    1x,
              /img/gallery/Image1@2xTablet.webp 2x
            "
            width="340"
            hight="368"
          />
          <source
            media="(max-width: 768px)"
            srcset="
              /img/gallery/Image1Mob.webp    1x,
              /img/gallery/Image1@2xMob.webp 2x
            "
          />
          <img src="/img/gallery/Image1Mob.webp" alt="Purple bracelet" loading="lazy"/>
        </picture>
        <picture
          ><source
            media="(min-width: 1440px)"
            srcset="
              /img/gallery/Image2@Desktop.webp   1x,
              /img/gallery/Image2@2xDesktop.webp 2x
            "
          />
          <source
            media="(min-width: 768px)"
            srcset="
              /img/gallery/Image2@2xTablet.webp 1x,
              /img/gallery/Image2@2xTablet.webp 2x
            "
          />
          <source
            media="(max-width: 768px)"
            srcset="
              /img/gallery/Image2Mob.webp    1x,
              /img/gallery/Image2@2xMob.webp 2x
            "
          />
          <img src="/img/gallery/Image2Mob.webp" alt="Orange pendant" loading="lazy"/>
        </picture>
      </li>
      <li class="gallery-list-item">
        <picture
          ><source
            media="(min-width: 1440px)"
            srcset="
              /img/gallery/Image3@Desktop.webp   1x,
              /img/gallery/Image3@2xDesktop.webp 2x
            "
          />
          <source
            media="(min-width: 768px)"
            srcset="
              /img/gallery/Image3Tablet.webp    1x,
              /img/gallery/Image3@2xTablet.webp 2x
            "
          />
          <source
            media="(max-width: 768px)"
            srcset="
              /img/gallery/Image3Mob.webp    1x,
              /img/gallery/Image3@2xMob.webp 2x
            "
          />
          <img src="/img/gallery/Image3Mob.webp" alt="Beaded choker" loading="lazy"/>
        </picture>
        <picture
          ><source
            media="(min-width: 1440px)"
            srcset="
              /img/gallery/Image4@Desktop.webp   1x,
              /img/gallery/Image4@2xDesktop.webp 2x
            "
          />
          <source
            media="(min-width: 768px)"
            srcset="
              /img/gallery/Image4Tablet.webp    1x,
              /img/gallery/Image4@2xTablet.webp 2x
            "
          />
          <source
            media="(max-width: 768px)"
            srcset="
              /img/gallery/Image4Mob.webp    1x,
              /img/gallery/Image4@2xMob.webp 2x
            "
          />
          <img src="/img/gallery/Image4Mob.webp" alt="Floral earrings" loading="lazy"/>
        </picture>
      </li>
    </ul>
  </div>
</section>
